<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="header">BUDGET TRACKER</div>
    <div class="summary-container">
      <div class="summary-title">Summary</div>
      <div class="total-container">
        <div class="total-title">Total Balance:</div>
        <div class="total-display">$200.00</div>
      </div>
      <div class="income-container">
        <div class="income-title">Income:</div>
        <div class="total-display">$300.00</div>
      </div>
      <div class="expenses-container">
        <div class="expenses-title">Expenses:</div>
        <div class="expenses-display">$-100.00</div>
      </div>
    </div>

    <button class="new-item">Add New Item</button>
    <div class="recent-container">
      <div class="recent-title">Recent Transactions</div>
      <div class="transaction-container">
        <div class="transaction">Groceries</div>
        <div class="transaction">-$200</div>
        <div class="transaction">Food</div>
        <div class="delete-transaction">[Delete]</div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
