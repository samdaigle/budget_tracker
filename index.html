<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-header">BUDGET TRACKER</div>
    <div class="summary">
      <h2 class="summary__title">Summary</h2>
      <div class="summary__item summary__item--balance">

      <span class="summary__label">Total Balance</span>
      <span class="summary__value">$200.00</span>

      <div class="income-container">
        <div class="income-title">Income:</div>
        <div class="total-display">$300.00</div>
      </div>
      <div class="expenses-container">
        <div class="expenses-title">Expenses:</div>
        <div class="expenses-display">$-100.00</div>
      </div>
    </div>

    <button class="btn btn--primary">Add New Item</button>

    <div class="form">
      <div class="form__title">Add New Item</div>
      <div class="form__group">
        <input type="radio" id="income-button" />
        <label for="income-button">Income</label>
      </div>
      <div class="expense">
        <input type="radio" id="expense-button" />
        <label for="income-button">Expense</label>
      </div>
      <div class="amount">
        <label for="amount">Amount:</label>
        <input type="text" id="amount" />
      </div>
      <div class="categories">
        <label for="categories">Category:</label>
        <select name="categories" id="category-select">
          <option value="">--Please choose an option--</option>
        </select>
      </div>
      <button>submit</button>
    </div>

    <div class="recent-container">
      <div class="recent-title">Recent Transactions</div>
      <div class="transaction-container">
        <div class="transaction">Groceries</div>
        <div class="transaction">-$200</div>
        <div class="transaction">Food</div>
        <div class="delete-transaction">[Delete]</div>
      </div>
    </div>
    <dialog>
      <h2>hello</h2>
    </dialog>

    <script src="main.js"></script>
  </body>
</html>
